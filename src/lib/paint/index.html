<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <title>Paint Tool Demo</title>
  <link rel="stylesheet" href="paint.css">
  <link rel="stylesheet" href="color-picker.css">
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      font-family: system-ui, sans-serif;
      padding: 24px;
      background: #1a1a2e;
      color: #e0e0e0;
      margin: 0;
    }

    h1 {
      color: #4da3ff;
      margin-bottom: 4px;
    }

    h2 {
      color: #aaa;
      font-size: 1rem;
      font-weight: normal;
      border-bottom: 1px solid #333;
      padding-bottom: 6px;
      margin-top: 32px;
    }

    .section {
      margin-bottom: 32px;
    }

    /* ─ 外付けツールバー（埋め込みモード用） ─ */
    .ext-toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
      align-items: center;
      background: #111;
      border: 1px solid #333;
      border-radius: 6px;
      padding: 6px 8px;
      margin-bottom: 10px;
    }

    .ext-toolbar button {
      padding: 4px 8px;
      font-size: 12px;
      cursor: pointer;
      border: 1px solid #555;
      border-radius: 4px;
      background: #2b2b2b;
      color: #ddd;
      transition: background .15s;
    }

    .ext-toolbar button:hover {
      background: #3a3a3a;
    }

    .ext-toolbar button.active {
      background: #1a6fc4;
      border-color: #4da3ff;
      color: #fff;
    }

    .ext-toolbar label {
      font-size: 12px;
      color: #aaa;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #ext-color-btn {
      width: 32px;
      height: 28px;
      border-radius: 4px;
      border: 2px solid #888;
      cursor: pointer;
      background: #000;
    }

    /* ─ ポップアップ ─ */
    #popup-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      z-index: 1000;
      align-items: center;
      justify-content: center;
    }

    #popup-content {
      background: #232323;
      padding: 20px;
      border-radius: 10px;
      position: relative;
      border: 1px solid #444;
      resize: both;
      overflow: auto;
      min-width: 400px;
      min-height: 300px;
    }

    #btn-open-popup {
      padding: 10px 24px;
      font-size: 15px;
      cursor: pointer;
      background: #1a6fc4;
      color: #fff;
      border: none;
      border-radius: 6px;
    }

    #btn-open-popup:hover {
      background: #1a5fa0;
    }

    /* ─ ドロップゾーン ─ */
    #drop-zone-section {
      display: flex;
      flex-wrap: wrap;
      gap: 16px;
      align-items: flex-start;
    }

    #drop-zone {
      width: 220px;
      min-height: 120px;
      border: 2px dashed #4a5568;
      border-radius: 8px;
      background: #12121e;
      color: #6a7a9a;
      font-size: 13px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 6px;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      padding: 12px;
      text-align: center;
      flex-shrink: 0;
    }

    #drop-zone.drag-over {
      border-color: #4da3ff;
      background: #1a1f35;
      color: #97c3ff;
    }

    #drop-zone.has-file {
      border-color: #36a856;
      color: #6ee090;
    }

    #drop-preview {
      max-width: 200px;
      max-height: 100px;
      border-radius: 4px;
      display: none;
    }

    #drop-info {
      flex: 1;
      min-width: 260px;
    }

    #drop-info h4 {
      margin: 0 0 6px 0;
      font-size: 12px;
      color: #7a8aaa;
      font-weight: normal;
    }

    .drop-data-box {
      background: #0e0e1a;
      border: 1px solid #2a2a40;
      border-radius: 5px;
      padding: 6px 8px;
      font-family: monospace;
      font-size: 10px;
      color: #8a9abc;
      word-break: break-all;
      max-height: 70px;
      overflow-y: auto;
      margin-bottom: 8px;
    }

    .drop-data-box.base64-box {
      max-height: 90px;
    }

    #open-popup-row {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
    }

    #load-mode {
      background: #2a2a3c;
      border: 1px solid #4a4a5c;
      color: #ccc;
      border-radius: 5px;
      padding: 5px 8px;
      font-size: 13px;
      cursor: pointer;
    }
  </style>
</head>

<body>

  <h1>🎨 Paint Tool Demo</h1>

  <!-- ═══════════════════════════════════════════════════════
     1. 内蔵ツールバーモード（toolbar: true）
     ─ ライブラリが ColorPicker のトリガーここへのコールバックを受け取る例
════════════════════════════════════════════════════════ -->
  <h2>1. 内蔵ツールバーモード（toolbar: true）</h2>
  <div class="section">
    <div id="paint-container-tb"></div>
  </div>

  <hr style="border-color:#333; margin: 32px 0;">

  <!-- ═══════════════════════════════════════════════════════
     2. 外付けツールバーモード（toolbar: false、手動配線）
════════════════════════════════════════════════════════ -->
  <h2>2. 外付けツールバーモード（toolbar: false）</h2>
  <div class="section">
    <div class="ext-toolbar">
      <button id="ext-brush" class="active" title="ブラシ">🖊</button>
      <button id="ext-eraser" title="消しゴム">⬜</button>
      <button id="ext-fill" title="塗りつぶし">🪣</button>
      <button id="ext-rect" title="矩形">▭</button>
      <button id="ext-ellipse" title="楕円">◯</button>
      <div style="display:flex; flex-direction:column; gap:2px;">
        <div style="display:flex; gap:2px;">
          <button id="ext-arrow-up" style="padding:2px;" title="矢印上">⬆</button>
        </div>
        <div style="display:flex; gap:2px;">
          <button id="ext-arrow-left" style="padding:2px;" title="矢印左">⬅</button>
          <button id="ext-arrow-down" style="padding:2px;" title="矢印下">⬇</button>
          <button id="ext-arrow-right" style="padding:2px;" title="矢印右">➡</button>
        </div>
      </div>
      <button id="ext-text" title="テキスト">T</button>
      <button id="ext-select" title="矩形選択">⬚</button>
      <button id="ext-copy">📋 Copy</button>
      <button id="ext-paste">📋 Paste</button>
      <div style="display:flex; gap:2px; border-left:1px solid #444; border-right:1px solid #444; padding:0 6px;">
        <button id="ext-zoom-out" title="縮小">🔍-</button>
        <button id="ext-zoom-reset" title="100% / 中央配置">💯</button>
        <button id="ext-zoom-in" title="拡大">🔍+</button>
      </div>
      <button id="ext-color-btn" style="background:#000" title="色"></button>
      <label>太さ <input type="range" id="ext-size" min="1" max="80" value="3" style="width:60px;"></label>
      <button id="ext-undo" title="元に戻す">↩</button>
      <button id="ext-redo" title="やり直す">↪</button>
      <input type="file" id="ext-file" accept="image/*" style="display:none">
      <button onclick="document.getElementById('ext-file').click()" title="開く">📂</button>
      <button id="ext-clear" title="全消去">🗑</button>
      <button id="ext-save-png">💾 PNG</button>
      <button id="ext-save-jpg">💾 JPG</button>
      <button id="ext-save" title="上書き保存">💾 保存</button>
      <label>フォント <input type="number" id="ext-font-size" min="8" max="200" value="20" style="width:50px;"></label>
    </div>
    <div id="paint-container-ext"></div>
  </div>

  <hr style="border-color:#333; margin: 32px 0;">

  <!-- ═══════════════════════════════════════════════════════
     3. ポップアップモード
════════════════════════════════════════════════════════ -->
  <h2>3. ポップアップモード</h2>
  <div class="section">
    <div id="drop-zone-section">
      <!-- 画像ドロップゾーン -->
      <div id="drop-zone" title="画像ファイルをここにドロップ">
        <img id="drop-preview" alt="プレビュー">
        <span id="drop-label">🖼️ 画像をここにドラッグ</span>
      </div>
      <!-- 情報表示 -->
      <div id="drop-info">
        <h4>ファイルパス</h4>
        <div class="drop-data-box" id="drop-path-box">―</div>
        <h4>BASE64</h4>
        <div class="drop-data-box base64-box" id="drop-b64-box">―</div>
      </div>
    </div>
    <!-- 開くボタン行 -->
    <div id="open-popup-row" style="margin-top:14px;">
      <button id="btn-open-popup">🖼 ペイントツールを開く</button>
      <label style="font-size:12px;color:#aaa;">画像の渡し方:
        <select id="load-mode">
          <option value="none">― (何も渡さない)</option>
          <option value="base64">BASE64データで読み込む</option>
          <option value="path">ファイルパスで読み込む</option>
        </select>
      </label>
    </div>
  </div>

  <div id="popup-overlay">
    <div id="popup-content">
      <div id="popup-paint-container"></div>
    </div>
  </div>

  <!-- ─── スクリプト ─── -->
  <script src="paint.js"></script>
  <script src="color-picker.js"></script>
  <script>

    // ───────────────────────────────────────────────────────
    // 自作の確認ダイアログ (ブラウザネイティブの confirm 回避用)
    // ───────────────────────────────────────────────────────
    // ※ window.confirm だとカウントダウンが止まらず5秒経過でセキュリティエラーになるため、
    //   「OK」を押した瞬間に新たなクリック判定（User Activation）を発生させる仕組みです。
    const customConfirm = (message) => {
      return new Promise((resolve) => {
        const bg = document.createElement('div');
        bg.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);z-index:9999;display:flex;align-items:center;justify-content:center;';

        const box = document.createElement('div');
        box.style.cssText = 'background:#2a2a2e;padding:24px;border-radius:10px;border:1px solid #4a4a5a;text-align:center;box-shadow:0 8px 30px rgba(0,0,0,0.6);min-width:300px;';

        const text = document.createElement('p');
        text.style.cssText = 'margin:0 0 20px 0;white-space:pre-wrap;color:#e0e0e0;font-size:14px;';
        text.textContent = message;

        const btnBox = document.createElement('div');
        btnBox.style.cssText = 'display:flex;justify-content:space-between;gap:12px;';

        const cancelBtn = document.createElement('button');
        cancelBtn.textContent = 'キャンセル';
        cancelBtn.style.cssText = 'flex:1;padding:8px;background:#444;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;';

        const okBtn = document.createElement('button');
        okBtn.textContent = 'OK (上書き)';
        okBtn.style.cssText = 'flex:1;padding:8px;background:#c0392b;color:#fff;border:none;border-radius:6px;cursor:pointer;font-size:14px;font-weight:bold;';

        cancelBtn.onmouseover = () => cancelBtn.style.background = '#555';
        cancelBtn.onmouseout = () => cancelBtn.style.background = '#444';
        okBtn.onmouseover = () => okBtn.style.background = '#e74c3c';
        okBtn.onmouseout = () => okBtn.style.background = '#c0392b';

        cancelBtn.onclick = () => { document.body.removeChild(bg); resolve(false); };
        okBtn.onclick = () => { document.body.removeChild(bg); resolve(true); };

        btnBox.appendChild(cancelBtn);
        btnBox.appendChild(okBtn);
        box.appendChild(text);
        box.appendChild(btnBox);
        bg.appendChild(box);
        document.body.appendChild(bg);
      });
    };

    // ═══════════════════════════════════════════════════════
    // 1. 内蔵ツールバーモード
    // ═══════════════════════════════════════════════════════
    const tbPaint = new PaintLibrary({
      container: document.getElementById('paint-container-tb'),
      width: 700,
      height: 400,
      toolbar: true, // 内蔵ツールバーを有効化
      toolbarItems: {
        open: false,   // 「ファイルを開く」を非表示にする例
        savePng: false // 「PNG保存」を非表示にする例
      },
      // ColorPicker のポップアップを外から注入するコールバック
      onColorPickerRequest: (currentColor, anchorEl) => {
        tbColorPicker.show(anchorEl);
      },
      onHistoryChange: (canUndo, canRedo) => {
        // ライブラリ内蔵のUndoボタンが自動でdisabledになるため追加処理は不要
      }
    });

    // ColorPicker を内蔵ツールバーの色ボタンに連携
    const tbColorPicker = new ColorPickerUI({
      color: '#000000',
      isPopup: true,
      layout: 'horizontal',
      onChange: (color) => {
        const hex = color.toHexString(true);
        tbPaint.setColor(hex);
      }
    });

    // ═══════════════════════════════════════════════════════
    // 2. 外付けツールバーモード
    // ═══════════════════════════════════════════════════════
    const extPaint = new PaintLibrary({
      container: document.getElementById('paint-container-ext'),
      width: 700,
      height: 450,
      // ツール変化をボタンのアクティブ状態に反映するコールバック
      onToolChange: (tool) => {
        const tools = ['brush', 'eraser', 'fill', 'rect', 'ellipse', 'text', 'select', 'arrow-up', 'arrow-down', 'arrow-left', 'arrow-right'];
        tools.forEach(t => {
          const el = document.getElementById('ext-' + t);
          if (el) el.classList.toggle('active', tool === t);
        });
      },
      // Undo/Redo可否をボタンに反映するコールバック
      onHistoryChange: (canUndo, canRedo) => {
        document.getElementById('ext-undo').disabled = !canUndo;
        document.getElementById('ext-redo').disabled = !canRedo;
      }
    });

    // ColorPicker を外付けツールバーの色ボタンに連携
    const extColorBtn = document.getElementById('ext-color-btn');
    const extColorPicker = new ColorPickerUI({
      color: '#000000',
      isPopup: true,
      layout: 'horizontal',
      onChange: (color) => {
        const hex = color.toHexString(true);
        extColorBtn.style.backgroundColor = hex;
        extPaint.setColor(hex);
      }
    });
    extColorBtn.addEventListener('click', (e) => { e.stopPropagation(); extColorPicker.show(extColorBtn); });

    document.getElementById('ext-brush').addEventListener('click', () => extPaint.setTool('brush'));
    document.getElementById('ext-eraser').addEventListener('click', () => extPaint.setTool('eraser'));
    document.getElementById('ext-fill').addEventListener('click', () => extPaint.setTool('fill'));
    document.getElementById('ext-rect').addEventListener('click', () => extPaint.setTool('rect'));
    document.getElementById('ext-ellipse').addEventListener('click', () => extPaint.setTool('ellipse'));
    document.getElementById('ext-arrow-up').addEventListener('click', () => extPaint.setTool('arrow-up'));
    document.getElementById('ext-arrow-down').addEventListener('click', () => extPaint.setTool('arrow-down'));
    document.getElementById('ext-arrow-left').addEventListener('click', () => extPaint.setTool('arrow-left'));
    document.getElementById('ext-arrow-right').addEventListener('click', () => extPaint.setTool('arrow-right'));
    document.getElementById('ext-text').addEventListener('click', () => extPaint.setTool('text'));
    document.getElementById('ext-select').addEventListener('click', () => extPaint.setTool('select'));
    document.getElementById('ext-paste').addEventListener('click', () => extPaint.paste());

    document.getElementById('ext-zoom-out').addEventListener('click', () => extPaint.applyZoom(0.8));
    document.getElementById('ext-zoom-reset').addEventListener('click', () => extPaint.resetTransform());
    document.getElementById('ext-zoom-in').addEventListener('click', () => extPaint.applyZoom(1.25));

    document.getElementById('ext-size').addEventListener('input', (e) => extPaint.setLineWidth(parseInt(e.target.value, 10)));
    document.getElementById('ext-font-size').addEventListener('input', (e) => extPaint.setFontSize(parseInt(e.target.value, 10)));
    document.getElementById('ext-undo').addEventListener('click', () => extPaint.undo());
    document.getElementById('ext-redo').addEventListener('click', () => extPaint.redo());
    document.getElementById('ext-clear').addEventListener('click', () => { if (confirm('全消去しますか？')) extPaint.clearCanvas(); });
    document.getElementById('ext-save-png').addEventListener('click', () => extPaint.downloadImage('drawing.png', 'image/png'));
    document.getElementById('ext-save-jpg').addEventListener('click', () => extPaint.downloadImage('drawing.jpg', 'image/jpeg'));
    document.getElementById('ext-save').addEventListener('click', () => extPaint.saveOverwrite());
    document.getElementById('ext-file').addEventListener('change', (e) => {
      if (e.target.files.length > 0) extPaint.loadImage(e.target.files[0]);
    });

    // ═══════════════════════════════════════════════════════
    // 3. ポップアップモード + ドロップゾーン
    // ═══════════════════════════════════════════════════════
    const popupPaint = new PaintLibrary({
      container: document.getElementById('popup-paint-container'),
      width: 800,
      height: 560,
      toolbar: true,
      toolbarItems: {
        savePng: false,
        save: false
      },
      onColorPickerRequest: (currentColor, anchorEl) => {
        popupColorPicker.show(anchorEl);
      },
      actionButtons: {
        cancelText: 'キャンセル',
        saveText: '保存',
        onCancel: () => {
          // キャンセル時は変更を破棄して閉じる
          document.getElementById('popup-overlay').style.display = 'none';
        },
        onSave: async (editedBase64) => {
          const mode = document.getElementById('load-mode').value;

          if (mode === 'path' && droppedPath) {
            // パス渡しの場合
            const isOk = await customConfirm(`ファイル「${droppedPath}」を上書きします。\nよろしいですか？`);
            if (isOk) {
              if (droppedFileHandle) {
                try {
                  const writable = await droppedFileHandle.createWritable();
                  const blob = await new Promise(r => popupPaint.getCanvas().toBlob(r, 'image/png'));
                  await writable.write(blob);
                  await writable.close();
                  document.getElementById('popup-overlay').style.display = 'none';
                  alert('ファイルを上書き保存しました。');
                  return;
                } catch (e) {
                  console.error('上書き保存エラー:', e);
                  alert('上書き保存に失敗したため、ダウンロードを試行します。');
                }
              }
              // ※ブラウザの仕様上ローカルの任意パスへの直接上書きはAPIが必要。handleが無い場合はダウンロードで代用
              popupPaint.downloadImage(droppedPath.split(/[/\\]/).pop());
              document.getElementById('popup-overlay').style.display = 'none';
            }
          } else {
            // BASE64などを受け取っていた場合、それをプレビュー側に返す
            droppedBase64 = editedBase64;
            document.getElementById('drop-preview').src = droppedBase64;
            document.getElementById('drop-preview').style.display = 'block';
            document.getElementById('drop-b64-box').textContent = droppedBase64.substring(0, 300) + '… (編集済み)';
            document.getElementById('drop-zone').classList.add('has-file');
            document.getElementById('drop-label').textContent = '編集後の画像';
            console.log('ポップアップから編集済みのBase64データを受け取りました');
            document.getElementById('popup-overlay').style.display = 'none';
          }
        }
      }
    });
    const popupColorPicker = new ColorPickerUI({
      color: '#000000',
      isPopup: true,
      layout: 'horizontal',
      onChange: (color) => {
        popupPaint.setColor(color.toHexString(true));
      }
    });

    // ─ ドロップゾーン ロジック ─
    const dropZone = document.getElementById('drop-zone');
    const dropLabel = document.getElementById('drop-label');
    const dropPreview = document.getElementById('drop-preview');
    const dropPathBox = document.getElementById('drop-path-box');
    const dropB64Box = document.getElementById('drop-b64-box');
    let droppedBase64 = null;
    let droppedPath = null;
    let droppedFileHandle = null;

    const preventDefaults = (e) => { e.preventDefault(); e.stopPropagation(); };
    ['dragenter', 'dragover', 'dragleave', 'drop'].forEach(ev => dropZone.addEventListener(ev, preventDefaults));

    dropZone.addEventListener('dragenter', () => dropZone.classList.add('drag-over'));
    dropZone.addEventListener('dragover', () => dropZone.classList.add('drag-over'));
    dropZone.addEventListener('dragleave', () => dropZone.classList.remove('drag-over'));

    dropZone.addEventListener('drop', async (e) => {
      dropZone.classList.remove('drag-over');
      const file = e.dataTransfer.files[0];
      const item = e.dataTransfer.items[0];

      if (!file || !file.type.startsWith('image/')) {
        dropLabel.textContent = '⚠️ 画像ファイルをドロップしてください';
        return;
      }

      // ドラッグ&ドロップのFileHandleを取得（真の上書き保存に利用）
      droppedFileHandle = null;
      if (item && item.getAsFileSystemHandle) {
        try {
          droppedFileHandle = await item.getAsFileSystemHandle();
        } catch (err) {
          console.warn('ファイルハンドル取得失敗:', err);
        }
      }

      // ファイルパスの取得（URI 形式で入手できる場合）
      const uriList = e.dataTransfer.getData('text/uri-list') || '';
      droppedPath = uriList.split('\n').map(s => s.trim()).find(s => s.startsWith('file:///')) || file.name;
      dropPathBox.textContent = droppedPath;

      // Base64 変換
      const reader = new FileReader();
      reader.onload = (ev) => {
        droppedBase64 = ev.target.result;
        // プレビュー表示
        dropPreview.src = droppedBase64;
        dropPreview.style.display = 'block';
        dropLabel.textContent = file.name;
        dropB64Box.textContent = droppedBase64.substring(0, 300) + '…';
        dropZone.classList.add('has-file');
      };
      reader.readAsDataURL(file);
    });

    // ─ ポップアップ開く/閉じる時の受け渡しロジック ─
    const overlay = document.getElementById('popup-overlay');
    document.getElementById('btn-open-popup').addEventListener('click', async () => {
      const mode = document.getElementById('load-mode').value;
      overlay.style.display = 'flex';
      if (mode === 'base64' && droppedBase64) {
        await popupPaint.loadImage(droppedBase64);
      } else if (mode === 'path' && droppedPath) {
        // file:/// URI またはパスをそのまま渡す
        await popupPaint.loadImage(droppedPath).catch(() => {
          // ブラウザのセキュリティ制限でパスが読めない場合は Base64 でフォールバック
          if (droppedBase64) popupPaint.loadImage(droppedBase64);
        });
      }
    });

    // 背景（暗い部分）クリック時でのクローズ処理（キャンセル扱い）
    overlay.addEventListener('click', (e) => {
      if (e.target === overlay) {
        overlay.style.display = 'none';
      }
    });

  </script>
</body>

</html>
